<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::section})}">

<head>
    <title>Ολοκληρωμένα αιτήματα</title>
</head>

<body>
<section>
    <div class="mc-page-head">
        <h2 class="mc-page-title">Ολοκληρωμένα αιτήματα</h2>

        <div class="mc-page-actions">
            <a class="mc-btn mc-btn-ghost" th:href="@{/citizen/requests}">Ενεργά αιτήματα</a>
            <a class="mc-btn mc-btn-primary" th:href="@{/citizen/request-new}">Νέο αίτημα</a>
        </div>
    </div>

    <div class="mc-card">
        <table class="mc-table">
            <thead>
            <tr>
                <th>Πρωτόκολλο</th>
                <th>Τύπος</th>
                <th>Κατάσταση</th>
                <th>Υπάλληλος</th>
                <th>Ημ/νία</th>
                <th class="mc-col-actions">Λεπτομέρειες</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="r : ${requests}">
                <td>
                    <a class="mc-link"
                       th:href="@{'/citizen/requests/' + ${r.id}}"
                       th:text="${r.protocolNumber}">PR-0001</a>
                </td>

                <td>
                    <span th:text="${r.typeTitle != null ? r.typeTitle : r.typeCode}">Τύπος</span>
                </td>

                <td>
                    <span class="mc-badge"
                          th:classappend="${
                            r.status.name() == 'COMPLETED' ? ' mc-badge-success' :
                            (r.status.name() == 'REJECTED' ? ' mc-badge-danger' : ' mc-badge-neutral')
                          }">
                        <span th:switch="${r.status.name()}">
                            <span th:case="'COMPLETED'">Ολοκληρώθηκε</span>
                            <span th:case="'REJECTED'">Απορρίφθηκε</span>
                            <span th:case="'SUBMITTED'">Υποβλήθηκε</span>
                            <span th:case="'RECEIVED'">Σε παραλαβή</span>
                            <span th:case="'IN_PROGRESS'">Σε επεξεργασία</span>
                            <span th:case="'WAITING_ADDITIONAL_INFO'">Αναμονή στοιχείων</span>
                            <span th:case="*"
                                  th:text="${#strings.replace(r.status.name(), '_', ' ')}">STATUS</span>
                        </span>
                    </span>
                </td>

                <td class="mc-muted" th:text="${r.assignedEmployeeFullName}">-</td>

                <td class="mc-muted"
                    th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>

                <td class="mc-col-actions">
                    <a class="mc-btn mc-btn-small mc-btn-outline"
                       th:href="@{'/citizen/requests/' + ${r.id}}">Προβολή</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="mc-empty" th:if="${#lists.isEmpty(requests)}">
            Δεν υπάρχουν ολοκληρωμένα αιτήματα.
            <a class="mc-link" th:href="@{/citizen/requests}">Πίσω στα ενεργά</a>.
        </div>
    </div>
</section>
</body>
</html>
