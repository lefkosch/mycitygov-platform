spring:
  datasource:
    # Persist μέσα στο volume /data που κάνεις mount στο docker-compose
    url: jdbc:h2:file:/data/mycitygov2db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true   #  για να ανοίγει από host όταν τρέχεις σε docker

server:
  port: 8080

mycitygov:
  mockgov:
    # server-to-server (container -> container)
    api-base-url: "http://mock-gov:8090"

    # link που θα πατήσει ο χρήστης στον browser
    # ΠΡΟΣΟΧΗ: να ταιριάζει με το port που εκθέτεις στο docker-compose (π.χ. 8091:8090)
    public-base-url: "http://localhost:8091"

    client-token: "mycitygov-client-token"

  noc:
    base-url: "http://noc:8081"
    sms:
      active: true   #  false = δεν στέλνει sms | true = στέλνει (αν το NOC είναι ρυθμισμένο με Routee)

  storage:
    s3:
      endpoint: "http://minio:9000"
      access-key: "minioadmin"
      secret-key: "minioadmin"
      bucket: "mycitygov"
      region: "us-east-1"
