services:
  minio:
    image: minio/minio
    container_name: mycitygov-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mock-gov:
    build:
      context: ./mock-gov-service
      dockerfile: Dockerfile
    image: mycitygov-mock-gov:1.0
    container_name: mycitygov-mock-gov
    ports:
      - "8091:8090"
    environment:
      SERVER_PORT: 8090

  noc:
    build:
      context: ./DS-Lab-NOC-main
      dockerfile: Dockerfile
    image: mycitygov-noc:1.0
    container_name: mycitygov-noc
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081


  mycitygov:
    build:
      context: ./MyCityGov
      dockerfile: Dockerfile
    image: mycitygov-app:1.0
    container_name: mycitygov-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080

    volumes:
      - mycitygov_h2:/data
    depends_on:
      - minio
      - mock-gov
      - noc

volumes:
  minio_data:
  mycitygov_h2:
